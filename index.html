<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐾 Perros en Adopción — Madrid</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .dog-card { animation: fade-up 0.3s ease both; }

    @keyframes progress-stripe {
      to { background-position: 40px 0; }
    }
    .progress-bar {
      background-image: repeating-linear-gradient(
        45deg, rgba(255,255,255,.18) 0, rgba(255,255,255,.18) 10px,
        transparent 10px, transparent 20px
      );
      animation: progress-stripe 0.55s linear infinite;
    }
    .line-clamp-3 {
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
    }
  </style>
</head>
<body class="bg-stone-50 min-h-screen">

  <!-- ── Header ────────────────────────────────────────────────────────────── -->
  <header class="bg-white border-b border-stone-200">
    <div class="max-w-5xl mx-auto px-4 py-5 flex items-center gap-3">
      <span class="text-3xl select-none">🐾</span>
      <div>
        <h1 class="text-xl font-bold text-gray-900 leading-tight">Buscador de Perros en Adopción</h1>
        <p class="text-xs text-gray-400">Pega la URL de un refugio y encuentra tu compañero ideal</p>
      </div>
    </div>
  </header>

  <!-- ── Search ─────────────────────────────────────────────────────────────── -->
  <section class="bg-amber-500 py-10 px-4">
    <div class="max-w-2xl mx-auto">
      <p class="text-amber-100 text-xs font-semibold mb-2 tracking-widest uppercase">URL del refugio</p>
      <div class="flex gap-2">
        <input id="urlInput" type="url"
          placeholder="https://petshelter.miwuki.com/perros-en-adopcion-en-madrid"
          value="https://petshelter.miwuki.com/perros-en-adopcion-en-madrid"
          class="flex-1 rounded-xl px-4 py-3 text-sm bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-white/60 placeholder:text-gray-400"
        />
        <button id="searchBtn" onclick="startSearch()"
          class="shrink-0 bg-gray-900 hover:bg-gray-700 active:scale-95 text-white font-semibold px-5 py-3 rounded-xl transition-all text-sm flex items-center gap-2">
          <span id="btnIcon">🔍</span>
          <span id="btnText">Buscar</span>
        </button>
      </div>
      <p id="modeTag" class="text-amber-100/60 text-xs mt-2"></p>
    </div>
  </section>

  <!-- ── Progress ───────────────────────────────────────────────────────────── -->
  <div id="progressSection" class="hidden max-w-2xl mx-auto mt-8 px-4">
    <div class="bg-white rounded-2xl shadow-sm border border-stone-200 p-5">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <span id="phaseIcon" class="text-lg">⏳</span>
          <p id="phaseLabel" class="text-sm font-semibold text-gray-700">Cargando listado...</p>
        </div>
        <span id="progressCount" class="text-xs text-gray-400 tabular-nums"></span>
      </div>
      <div class="h-3 bg-stone-100 rounded-full overflow-hidden">
        <div id="progressFill"
          class="h-full bg-amber-400 rounded-full transition-[width] duration-300 ease-out progress-bar"
          style="width:0%"></div>
      </div>
      <p id="currentDog" class="text-xs text-gray-400 mt-2 h-4 truncate"></p>
    </div>
  </div>

  <!-- ── Error ──────────────────────────────────────────────────────────────── -->
  <div id="errorBox" class="hidden max-w-2xl mx-auto mt-4 px-4">
    <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3 space-y-1">
      <p><span class="font-semibold">Error:</span> <span id="errorMsg"></span></p>
      <p id="errorHint" class="text-xs text-red-500"></p>
    </div>
  </div>

  <!-- ── Results ────────────────────────────────────────────────────────────── -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    <div id="resultsHeader" class="hidden flex items-center gap-2 mb-5">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">Perros encontrados</h2>
      <span id="totalBadge" class="bg-amber-100 text-amber-800 text-xs font-bold px-2.5 py-0.5 rounded-full">0</span>
    </div>
    <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4"></div>
    <p id="emptyState" class="hidden text-center py-20 text-gray-400 text-base">
      🐕 No se encontraron perros. Comprueba la URL e inténtalo de nuevo.
    </p>
  </main>

<script>
// ── Detect context ─────────────────────────────────────────────────────────────
// Running as a Chrome extension: background worker handles fetch (no CORS).
// Running from file:// or http://localhost: try public CORS proxy as fallback.
const IS_EXT = typeof chrome !== 'undefined' && !!chrome.runtime?.id;

function isWonder(url)   { return url.includes('lahuelladewonder.es'); }
function isMascomad(url) { return url.includes('mascomad.org'); }

document.getElementById('modeTag').textContent = IS_EXT
  ? '✅ Modo extensión Chrome'
  : '✅ Powered by Netlify Functions';

// ── Fetch abstraction ──────────────────────────────────────────────────────────
async function fetchHTML(url, signal) {
  if (IS_EXT) {
    // Chrome extension: route through background.js (bypasses CORS via host_permissions)
    return new Promise((resolve, reject) => {
      chrome.runtime.sendMessage({ type: 'fetch', url }, response => {
        if (chrome.runtime.lastError)
          return reject(new Error(chrome.runtime.lastError.message));
        if (!response?.ok)
          return reject(new Error(response?.error ?? 'Fetch failed'));
        resolve(response.html);
      });
    });
  }
  // Netlify Function proxy — same origin, no CORS issues
  const proxyUrl = `/.netlify/functions/proxy?url=${encodeURIComponent(url)}`;
  const res = await fetch(proxyUrl, { signal });
  if (!res.ok) throw new Error(`HTTP ${res.status} al cargar la página`);
  return res.text();
}

async function fetchDoc(url, signal) {
  const html = await fetchHTML(url, signal);
  return new DOMParser().parseFromString(html, 'text/html');
}

function resolveHref(href, base) {
  if (!href) return null;
  if (href.startsWith('http')) return href;
  try { return new URL(href, base).toString(); } catch { return null; }
}

// ── Listing extractor (miwuki.com) ─────────────────────────────────────────────
function extractListing(doc, baseUrl) {
  const origin = new URL(baseUrl).origin;

  // Miwuki-specific: div.caso cards
  const cases = doc.querySelectorAll('div.caso');
  if (cases.length > 0) {
    return Array.from(cases).map(card => {
      const link     = card.querySelector('a[href]');
      const img      = card.querySelector('div.foto img');
      const nombreEl = card.querySelector('div.nombre');

      const nameNode = Array.from(nombreEl?.childNodes ?? [])
        .find(n => n.nodeType === 3 && n.textContent.trim());
      const name = nameNode?.textContent.trim()
        || img?.getAttribute('alt')?.replace(/^Adopta a\s*/i, '').trim()
        || null;

      const estadoClass = card.querySelector('div.estado')?.classList[1] ?? null;
      const STATUS = { e1:'Disponible', e2:'Reservado', e3:'Adoptado', e4:'Acogida temporal' };

      const tipoIcon = card.querySelector('div.tipo i');

      return {
        name,
        location: nombreEl?.querySelector('span')?.textContent.trim() || null,
        status:   STATUS[estadoClass] ?? null,
        tipo:     tipoIcon?.classList.contains('fa-house') ? 'Protectora' : 'Particular',
        image:    img?.getAttribute('src') || null,
        link:     resolveHref(link?.getAttribute('href'), origin),
      };
    });
  }

  // Generic fallback
  const selectors = ['[class*="AnimalCard"]','[class*="animal-card"]',
                     '[class*="PetCard"]','[class*="pet-card"]','article[class*="card"]'];
  let cards = [];
  for (const sel of selectors) { cards = [...doc.querySelectorAll(sel)]; if (cards.length) break; }
  if (!cards.length) {
    cards = [...doc.querySelectorAll('a[href]')]
      .filter(a => /adopc|perro|animal|mascota|dog/i.test(a.getAttribute('href') ?? '') && a.querySelector('img'));
  }
  return cards.map(card => {
    const img    = card.querySelector('img');
    const nameEl = card.querySelector('h1,h2,h3,h4,[class*="name"],[class*="nombre"]');
    const linkEl = card.tagName === 'A' ? card : card.querySelector('a[href]');
    return {
      name:  nameEl?.textContent?.trim() || img?.getAttribute('alt')?.replace(/^Adopta a\s*/i,'').trim() || null,
      image: img?.getAttribute('src') || null,
      link:  resolveHref(linkEl?.getAttribute('href'), origin),
    };
  });
}

// ── Listing extractor (lahuelladewonder.es — WooCommerce) ──────────────────────
function extractListingWonder(doc, baseUrl) {
  return Array.from(doc.querySelectorAll('li.product')).map(li => {
    const linkEl = li.querySelector('a.woocommerce-LoopProduct-link');
    const img    = li.querySelector('img.attachment-woocommerce_thumbnail');
    const nameEl = li.querySelector('h2.woocommerce-loop-product__title');

    const srcset = img?.getAttribute('srcset') || '';
    let image = img?.getAttribute('src') || null;
    if (srcset) {
      const best = srcset.split(',')
        .map(s => { const p = s.trim().split(/\s+/); return { url: p[0], w: parseInt(p[1]) || 0 }; })
        .sort((a, b) => b.w - a.w)[0];
      if (best?.url) image = best.url;
    }
    return {
      name:   nameEl?.textContent?.trim() || img?.getAttribute('alt')?.trim() || null,
      image, source: 'wonder',
      link:   resolveHref(linkEl?.getAttribute('href'), baseUrl),
    };
  });
}

function getPaginationUrls(doc, baseUrl) {
  const pages = new Set();
  doc.querySelectorAll('ul.page-numbers a.page-numbers[href]').forEach(a => {
    const m = (a.getAttribute('href') || '').match(/product-page=(\d+)/);
    if (m) pages.add(parseInt(m[1]));
  });
  if (!pages.size) return [];
  const base = new URL(baseUrl);
  base.searchParams.delete('product-page');
  return [...pages].sort((a, b) => a - b).map(n => {
    const u = new URL(base.toString());
    u.searchParams.set('product-page', n);
    return u.toString();
  });
}

// ── Detail extractor (miwuki.com profile page) ─────────────────────────────────
function extractDetail(doc) {
  const genderIcon = doc.querySelector('h1 i.fa-mars, h1 i.fa-venus');
  const gender = genderIcon?.getAttribute('title')
    || doc.querySelector('h1 .sr-only')?.textContent.trim()
    || null;

  const mainImg = doc.querySelector('.col-md-3 img, .col-12.col-md-3 img');
  const imageHD = mainImg?.getAttribute('src')?.replace(/\/\d+$/, '/800') || null;

  const gallery = [...doc.querySelectorAll('div.fotos a[href]')]
    .map(a => a.getAttribute('href')).filter(Boolean);

  // "Mis datos" — each div.col has value text + <span> label
  const dataFields = {};
  doc.querySelectorAll('div.row.detalles div[class^="col"]').forEach(div => {
    const label = div.querySelector('span')?.textContent.trim();
    if (!label) return;
    const value = div.textContent.replace(label, '').trim().replace(/\s+/g, ' ');
    if (value) dataFields[label] = value;
  });

  // Age: walk direct childNodes to exclude the date nested inside <span><small>
  let ageText = null;
  const ageDiv = [...doc.querySelectorAll('div.row.detalles div[class^="col"]')]
    .find(d => d.querySelector('span small'));
  if (ageDiv) {
    const parts = [];
    ageDiv.childNodes.forEach(n => {
      if (n.nodeType === 3) { const t = n.textContent.trim(); if (t) parts.push(t); }
      else if (n.nodeName === 'SMALL' && !n.textContent.includes('-')) parts.push(n.textContent.trim());
    });
    ageText = parts.join(' ').trim() || null;
  }

  const personality  = [...doc.querySelectorAll('div.pills span')].map(s => s.textContent.trim()).filter(Boolean);
  const deliverables = [...doc.querySelectorAll('ul.entrega li')].map(li => li.textContent.trim()).filter(Boolean);

  let description = null;
  doc.querySelectorAll('h2').forEach(h2 => {
    if (/historia/i.test(h2.textContent))
      description = h2.nextElementSibling?.textContent.trim() || null;
  });

  const w = dataFields['Peso'];
  return {
    gender, imageHD, gallery,
    breed:         dataFields['Raza'] || null,
    ageText,
    lifeStage:     dataFields['Edad'] || null,
    size:          dataFields['Tamaño'] || null,
    weight:        w && !/^0?\s*kg$/.test(w.trim()) ? w : null,
    activityLevel: dataFields['Nivel Actividad'] || null,
    personality, deliverables, description,
  };
}

// ── Detail extractor (lahuelladewonder.es profile page) ───────────────────────
function extractDetailWonder(doc) {
  const metaDesc = doc.querySelector('meta[name="description"]')?.getAttribute('content') || '';
  const lines = metaDesc.split('\n').map(l => l.trim()).filter(Boolean);

  let gender = null;
  if (lines.some(l => l.includes('♀'))) gender = 'Hembra';
  else if (lines.some(l => l.includes('♂'))) gender = 'Macho';

  let ageText = null;
  const ageLine = lines.find(l => l.includes('🎂'));
  if (ageLine) {
    const m = ageLine.match(/\(([^)]+)\)/);
    ageText = m ? m[1].split(' - ')[0].trim() : ageLine.replace(/.*🎂\s*/, '').trim();
  }

  let breed = null;
  const breedLine = lines.find(l => l.includes('🐕'));
  if (breedLine) {
    const m = breedLine.match(/Raza:\s*(.+)/i);
    breed = m ? m[1].trim() : breedLine.replace(/.*🐕\s*/, '').trim();
  }

  let character = null;
  const charLine = lines.find(l => l.includes('👤'));
  if (charLine) {
    const m = charLine.match(/Carácter:\s*(.+)/i);
    character = m ? m[1].trim() : charLine.replace(/.*👤\s*/, '').trim();
  }

  let location = null;
  const locLine = lines.find(l => l.includes('📍'));
  if (locLine) location = locLine.replace(/.*📍\s*/, '').trim();

  const emojiSet = ['🧡','🐾','♀','♂','🎂','🐕','👤','📍','🙏','❓','🐶','✅','❌'];
  const description = lines.filter(l => !emojiSet.some(e => l.includes(e))).join(' ').trim() || null;

  const mainImgEl = doc.querySelector('.woocommerce-product-gallery__image img[data-large_image]');
  const imageHD = mainImgEl?.getAttribute('data-large_image')
    || mainImgEl?.getAttribute('data-src')
    || doc.querySelector('img.wp-post-image')?.getAttribute('src')
    || null;

  const gallery = [...doc.querySelectorAll('.woocommerce-product-gallery__image a[href]')]
    .map(a => a.getAttribute('href')).filter(Boolean);

  return {
    gender, imageHD, gallery, breed, ageText, location,
    lifeStage: null, size: null, weight: null, activityLevel: null,
    personality: character ? [character] : [],
    deliverables: [], description,
  };
}

// ── MascoMad (mascomad.org) — API-based, no per-profile fetch needed ──────────
async function fetchMascomadDogs(signal) {
  const res = await fetch('/.netlify/functions/mascomad', { signal });
  if (!res.ok) throw new Error(`MascoMad API error: HTTP ${res.status}`);
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return (json.data || []).map(mapMascomadDog);
}

// For the Chrome extension: same two-step flow in the background service worker
async function fetchMascomadDogsExt(signal) {
  const listHtml = await fetchHTML('https://www.mascomad.org/Animales/ListAnimales', signal);
  const m = listHtml.match(/name="csrf-token" content="([^"]+)"/);
  const csrfToken = m?.[1] ?? '';
  // Extension fetch via background.js — pass method/headers/body as extras
  const json = await new Promise((resolve, reject) => {
    chrome.runtime.sendMessage({
      type: 'fetch',
      url: 'https://www.mascomad.org/Animales/GetAnimalesFiltrados',
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'RequestVerificationToken': csrfToken,
        'Referer': 'https://www.mascomad.org/Animales/ListAnimales',
        'X-Requested-With': 'XMLHttpRequest',
      },
      body: JSON.stringify({ draw: 1, start: 0, length: 3000 }),
    }, response => {
      if (chrome.runtime.lastError) return reject(new Error(chrome.runtime.lastError.message));
      if (!response?.ok) return reject(new Error(response?.error ?? 'Fetch failed'));
      try { resolve(JSON.parse(response.html)); } catch { reject(new Error('JSON parse error')); }
    });
  });
  return (json.data || []).map(mapMascomadDog);
}

function mapMascomadDog(r) {
  const imgBase = 'https://www.mascomad.org';
  const image = r.imagenPrincipalUrl ? imgBase + r.imagenPrincipalUrl : null;

  // Extract profile link from cardAnimal HTML
  const linkMatch = r.cardAnimal?.match(/href=["']([^"']+adopta[^"']+)["']/);
  const link = linkMatch?.[1] || null;

  const gender = r.genero === 'Hembra' ? 'Hembra' : r.genero === 'Macho' ? 'Macho' : null;

  // Compute age from fechaNacimiento if edadTexto is missing
  let ageText = r.edadTexto || null;
  if (!ageText && r.fechaNacimiento) {
    const born = new Date(r.fechaNacimiento);
    const now = new Date();
    const years = Math.floor((now - born) / (365.25 * 24 * 3600 * 1000));
    if (years >= 1) ageText = `${years} año${years > 1 ? 's' : ''}`;
    else {
      const months = Math.floor((now - born) / (30.44 * 24 * 3600 * 1000));
      ageText = `${months} mes${months !== 1 ? 'es' : ''}`;
    }
  }

  return {
    source: 'mascomad',
    name:        r.nombre || null,
    breed:       r.raza   || null,
    gender,
    size:        r.tamaño && r.tamaño !== 'No definido' ? r.tamaño : null,
    ageText,
    description: r.caracter || null,
    location:    r.protectoraNombre || null,
    image, imageHD: image,
    link,
    status: r.estadoAdopcion || null,
    personality: [],
    deliverables: [],
    gallery: [],
  };
}

// ── Concurrency pool ───────────────────────────────────────────────────────────
async function withPool(items, fn, concurrency) {
  let idx = 0;
  const worker = async () => {
    while (idx < items.length) {
      const i = idx++;
      await fn(items[i], i);
    }
  };
  await Promise.all(Array.from({ length: Math.min(concurrency, items.length) }, worker));
}

// ── Main search ────────────────────────────────────────────────────────────────
let abortCtrl = null;

async function startSearch() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;

  if (abortCtrl) abortCtrl.abort();
  abortCtrl = new AbortController();
  const { signal } = abortCtrl;

  // Reset UI
  document.getElementById('grid').innerHTML = '';
  document.getElementById('totalBadge').textContent = '0';
  document.getElementById('resultsHeader').classList.add('hidden');
  document.getElementById('emptyState').classList.add('hidden');
  document.getElementById('errorBox').classList.add('hidden');
  document.getElementById('progressSection').classList.remove('hidden');
  setProgress(3, '', 'Cargando listado...', '⏳', '');
  setBusy(true);

  try {
    // Step 1 — listing
    let dogs;

    if (isMascomad(url)) {
      // MascoMad uses a DataTables JSON API — all data in one call, no per-dog fetch
      setProgress(10, '', 'Consultando API de MascoMad...', '🔌', '');
      dogs = IS_EXT
        ? await fetchMascomadDogsExt(signal)
        : await fetchMascomadDogs(signal);
      dogs = dogs.filter(d => d.name || d.image);

      if (dogs.length === 0) {
        document.getElementById('emptyState').classList.remove('hidden');
        setProgress(100, '', 'Sin resultados', '🤷', '');
        return;
      }
      document.getElementById('resultsHeader').classList.remove('hidden');
      setProgress(100, `${dogs.length} animales`, `${dogs.length} animales cargados`, '✅', '');
      dogs.forEach(d => appendCard(d));
      document.getElementById('totalBadge').textContent = dogs.length;
      setTimeout(() => document.getElementById('progressSection').classList.add('hidden'), 2000);
      return;
    }

    const listDoc = await fetchDoc(url, signal);

    if (isWonder(url)) {
      dogs = extractListingWonder(listDoc, url);
      const morePages = getPaginationUrls(listDoc, url);
      if (morePages.length > 0) {
        setProgress(4, '', `Cargando ${morePages.length + 1} páginas...`, '📄', '');
        for (const pageUrl of morePages) {
          if (signal.aborted) break;
          const pageDoc = await fetchDoc(pageUrl, signal);
          dogs.push(...extractListingWonder(pageDoc, url));
        }
      }
    } else {
      dogs = extractListing(listDoc, url);
    }

    dogs = dogs.filter(d => d.name || d.image);

    if (dogs.length === 0) {
      document.getElementById('emptyState').classList.remove('hidden');
      setProgress(100, '', 'Sin resultados', '🤷', '');
      return;
    }

    document.getElementById('resultsHeader').classList.remove('hidden');
    setProgress(5, `${dogs.length} perros`, 'Obteniendo perfiles...', '🔗', '');

    // Step 2 — detail pages in parallel (4 concurrent)
    let done = 0;
    const total = dogs.length;

    await withPool(dogs, async (dog, i) => {
      if (signal.aborted) return;
      if (dog.link) {
        try {
          const detailDoc = await fetchDoc(dog.link, signal);
          const detailFn = dog.source === 'wonder' ? extractDetailWonder : extractDetail;
          dogs[i] = { ...dog, ...detailFn(detailDoc) };
        } catch (e) {
          if (e.name === 'AbortError') return;
        }
      }
      done++;
      setProgress(
        Math.round(5 + (done / total) * 95),
        `${done} / ${total}`,
        'Obteniendo perfiles...',
        '🔍',
        `Procesando: ${dog.name}`
      );
      appendCard(dogs[i]);
      document.getElementById('totalBadge').textContent = done;
    }, 4);

    if (!signal.aborted) {
      setProgress(100, `${total} perros`, `${total} perros cargados`, '✅', '');
      setTimeout(() => document.getElementById('progressSection').classList.add('hidden'), 2000);
    }

  } catch (err) {
    if (err.name === 'AbortError') return;
    document.getElementById('errorMsg').textContent = err.message;
    document.getElementById('errorHint').textContent = 'Asegúrate de que la URL es correcta e inténtalo de nuevo.';
    document.getElementById('errorBox').classList.remove('hidden');
    setProgress(0, '', 'Error al cargar', '❌', '');
  } finally {
    setBusy(false);
  }
}

// ── UI helpers ─────────────────────────────────────────────────────────────────
function setProgress(pct, count, label, icon, dog) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = count;
  document.getElementById('phaseLabel').textContent = label;
  document.getElementById('phaseIcon').textContent = icon;
  document.getElementById('currentDog').textContent = dog;
}

function setBusy(busy) {
  const btn = document.getElementById('searchBtn');
  btn.disabled = busy;
  btn.classList.toggle('opacity-60', busy);
  btn.classList.toggle('cursor-not-allowed', busy);
  document.getElementById('btnIcon').textContent = busy ? '⏳' : '🔍';
  document.getElementById('btnText').textContent  = busy ? 'Buscando...' : 'Buscar';
}

const STATUS_CLS = {
  'Disponible':       'bg-green-100 text-green-700',
  'Reservado':        'bg-yellow-100 text-yellow-700',
  'Adoptado':         'bg-gray-100 text-gray-400',
  'Acogida temporal': 'bg-blue-100 text-blue-700',
};

function pill(text, cls) {
  return `<span class="text-xs px-2 py-0.5 rounded-full font-medium ${cls}">${esc(text)}</span>`;
}

function appendCard(dog) {
  const img = dog.imageHD || dog.image;

  const pills = [
    dog.breed     && pill(dog.breed,     'bg-amber-100 text-amber-800'),
    dog.lifeStage && pill(dog.lifeStage, 'bg-blue-100 text-blue-800'),
    dog.gender    && pill(dog.gender,    dog.gender === 'Macho' ? 'bg-sky-100 text-sky-700' : 'bg-pink-100 text-pink-700'),
    dog.size      && pill(dog.size,      'bg-indigo-100 text-indigo-700'),
  ].filter(Boolean).join('');

  const deliverables = dog.deliverables?.length
    ? `<div class="flex flex-wrap gap-1 mt-2">${dog.deliverables.map(d =>
        `<span class="text-xs bg-green-50 text-green-700 border border-green-200 px-1.5 py-0.5 rounded">${esc(d)}</span>`
      ).join('')}</div>` : '';

  const personality = dog.personality?.length
    ? `<div class="flex flex-wrap gap-1 mt-1">${dog.personality.map(p =>
        `<span class="text-xs bg-violet-50 text-violet-600 border border-violet-200 px-1.5 py-0.5 rounded">${esc(p)}</span>`
      ).join('')}</div>` : '';

  const description = dog.description
    ? `<p class="text-xs text-gray-500 mt-2 line-clamp-3">${esc(dog.description.slice(0, 220))}${dog.description.length > 220 ? '…' : ''}</p>`
    : '';

  const locationIcon = dog.tipo === 'Protectora' ? '🏠' : dog.tipo === 'Particular' ? '👤' : (dog.location ? '📍' : '');
  const locationLine = [locationIcon, dog.location ?? ''].filter(Boolean).join(' ');

  const card = document.createElement('div');
  card.className = 'dog-card bg-white rounded-2xl shadow-sm border border-stone-100 overflow-hidden hover:shadow-md transition-shadow duration-200 flex flex-col';
  card.innerHTML = `
    <div class="relative">
      ${img
        ? `<div class="h-44 overflow-hidden bg-stone-100">
             <img src="${esc(img)}" alt="${esc(dog.name ?? '')}" loading="lazy"
               class="w-full h-full object-cover"
               onerror="this.parentElement.innerHTML='<div class=\\'h-44 bg-gradient-to-br from-amber-50 to-amber-100 flex items-center justify-center text-4xl\\'>🐕</div>'" />
           </div>`
        : `<div class="h-44 bg-gradient-to-br from-amber-50 to-amber-100 flex items-center justify-center text-4xl">🐕</div>`
      }
      ${dog.status
        ? `<span class="absolute top-2 right-2 text-xs font-semibold px-2 py-0.5 rounded-full shadow-sm ${STATUS_CLS[dog.status] ?? 'bg-gray-100 text-gray-500'}">${esc(dog.status)}</span>`
        : ''
      }
    </div>
    <div class="p-3 flex flex-col gap-1.5 flex-1">
      <h2 class="text-sm font-bold text-gray-800">${esc(dog.name ?? 'Sin nombre')}</h2>
      <div class="flex flex-wrap gap-1">${pills}</div>
      ${dog.ageText ? `<p class="text-xs text-gray-400">🎂 ${esc(dog.ageText)}</p>` : ''}
      ${dog.weight  ? `<p class="text-xs text-gray-400">⚖️ ${esc(dog.weight)}</p>`  : ''}
      ${description}
      ${personality}
      ${deliverables}
      ${locationLine ? `<p class="text-xs text-gray-400 mt-auto pt-1">${esc(locationLine)}</p>` : ''}
      ${dog.link
        ? `<a href="${esc(dog.link)}" target="_blank" rel="noopener"
             class="mt-1 block text-center bg-amber-500 hover:bg-amber-600 text-white text-xs font-semibold py-2 rounded-xl transition-colors">
             Ver perfil →
           </a>`
        : ''
      }
    </div>`;
  document.getElementById('grid').appendChild(card);
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startSearch();
});
</script>
</body>
</html>
